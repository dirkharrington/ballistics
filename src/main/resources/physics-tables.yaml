# ── Standard atmosphere model constants (imperial) ──────────────────────────
# Used by airDensityRatio(altFt, tempF) on both Java and JS sides.
atmosphere:
  stdTempF: 59.0              # ICAO standard sea-level temperature (°F)
  lapseRatePer1000Ft: 3.5     # Temperature lapse rate (°F per 1000 ft)
  rankineOffset: 459.67       # °F → °R (Rankine) conversion offset
  pressureCoeff: 6.87559e-6   # Pressure-altitude exponent base coefficient
  pressureExp: 5.256          # Pressure-altitude exponent
