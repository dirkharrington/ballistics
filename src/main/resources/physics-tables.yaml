# ── G7 drag function (Mayewski table for long-range boat-tail projectiles) ──
# v: velocity in fps   f: form factor F(v)
# G7 values are ~55–65% of G1 at supersonic speeds (less base drag) and converge
# to G1 at subsonic speeds.  Use with G7-derived ballistic coefficients.
