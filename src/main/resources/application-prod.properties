# ── Production overrides ──────────────────────────────────────────────────────
# Activate with: --spring.profiles.active=prod
# Or set environment variable: SPRING_PROFILES_ACTIVE=prod
#
# All values below must be set via environment variables in production.
# Do NOT commit real values to source control.

# REQUIRED: comma-separated list of allowed CORS origins for the deployed frontend.
# Example: CORS_ALLOWED_ORIGINS=https://app.example.com
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Item 6 — Actuator hardening for production.
# Bind actuator to an internal-only port (not exposed via public load-balancer).
# Only health + prometheus are exposed; health details are never shown.
management.server.port=8081
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never

# OPTIONAL: SSE timeout in ms. Default (30000) suits most deployments.
# Increase if upstream proxies (nginx, ALB) have a longer idle-connection timeout.
# app.sse.timeout-ms=${SSE_TIMEOUT_MS:60000}

# Item 7 — Disable Swagger UI and OpenAPI docs in production.
# The interactive test console and schema expose full API surface to anyone on the internet.
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Item 8 — Disable JSON pretty-printing in production.
# Indented responses are larger and provide readable API structure to attackers.
spring.jackson.serialization.indent-output=false

# OPTIONAL: tune server port if running behind a reverse proxy on a non-default port.
# server.port=${PORT:8080}
