spring.application.name=ballistics-visualizer
spring.config.import=classpath:bullets.yaml
spring.threads.virtual.enabled=true
server.port=8080

# Pretty-print JSON responses
spring.jackson.serialization.indent-output=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.tags.application=ballistics-visualizer
management.endpoint.health.show-details=always

spring.mvc.problemdetails.enabled=true

# HTTP compression
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json
server.compression.min-response-size=1024

# Long-lived cache for content-hashed static assets
spring.web.resources.cache.cachecontrol.max-age=365d
spring.web.resources.cache.cachecontrol.cache-public=true

# CORS â comma-separate multiple origins when deploying behind a real domain
app.cors.allowed-origins=http://localhost:8080
