spring.application.name=ballistics-visualizer
spring.config.import=classpath:bullets.yaml
spring.threads.virtual.enabled=true
server.port=8080

# Pretty-print JSON responses
spring.jackson.serialization.indent-output=true

# Actuator
management.endpoints.web.exposure.include=health,prometheus
management.metrics.tags.application=ballistics-visualizer
# Item 6 — never expose internal health details on the main port
management.endpoint.health.show-details=never

spring.mvc.problemdetails.enabled=true

# HTTP compression
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json
server.compression.min-response-size=1024

# index.html must not be cached (stale reference breaks after Vite rebuild)
# /assets/* are content-hashed and safe to cache forever — configured in WebConfig
spring.web.resources.add-mappings=false

# CORS — comma-separate multiple origins for staging/prod deployments.
# Override via CORS_ALLOWED_ORIGINS env var without touching source.
# Example: CORS_ALLOWED_ORIGINS=https://app.example.com,https://staging.example.com
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080}

# SSE timeout — how long the server holds a streaming compare connection open.
# Override via SSE_TIMEOUT_MS env var for slower networks or proxies.
app.sse.timeout-ms=${SSE_TIMEOUT_MS:30000}
