services:

  app:
    build: .
    # Item 11 — bind to localhost; let a reverse proxy handle TLS termination
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    healthcheck:
      test: ["CMD", "/jre/bin/java", "-cp", "/app", "org.springframework.boot.loader.launch.JarLauncher", "--management.endpoint.health.enabled=true"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  prometheus:
    image: prom/prometheus:v3.4.0
    # Item 11 — not exposed publicly; accessible only within the compose network
    expose:
      - "9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    depends_on:
      - app

  grafana:
    image: grafana/grafana:12.0.0
    # Item 11 — not exposed publicly; accessible only within the compose network
    expose:
      - "3000"
    environment:
      # :? causes compose to fail with a clear error if variable is unset — prevents
      # accidental deployment with no password.  Set GRAFANA_ADMIN_PASSWORD in .env or
      # via the deployment environment before running docker compose up.
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
